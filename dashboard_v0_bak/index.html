<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Intelligence Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0b0e14;
            --panel: rgba(255, 255, 255, 0.05);
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        body {
            margin: 0;
            padding: 30px;
            background-color: var(--bg);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .dashboard {
            max-width: 1300px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        h1 {
            font-weight: 700;
            font-size: 1.8rem;
            margin: 0;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--panel);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 24px;
        }

        .kpi-title {
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .kpi-value {
            font-size: 2rem;
            font-weight: 700;
        }

        .kpi-value.highlight {
            color: var(--accent);
            text-shadow: 0 0 15px var(--accent-glow);
        }

        .charts-main-grid {
            display: grid;
            grid-template-columns: 280px 1fr 300px;
            gap: 20px;
            margin-bottom: 30px;
        }

        .health-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .health-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
            font-size: 0.9rem;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .dot-ok {
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
        }

        .dot-err {
            background: var(--danger);
            box-shadow: 0 0 8px var(--danger);
        }

        .log-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        .log-table th {
            text-align: left;
            color: var(--text-secondary);
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .log-table td {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .badge {
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-family: monospace;
        }

        #historyChart {
            width: 100%;
            max-height: 350px;
        }
    </style>
</head>

<body>
    <div class="dashboard">
        <header>
            <h1>Bot Intelligence Dashboard</h1>
            <div id="lastUpdate" style="font-size: 0.8rem; color: var(--text-secondary);">Cargando...</div>
        </header>

        <div class="kpi-grid">
            <div class="card">
                <div class="kpi-title">HH Ahorradas (Total)</div>
                <div id="kpi-hh" class="kpi-value highlight">--</div>
            </div>
            <div class="card">
                <div class="kpi-title">Productos en Catálogo</div>
                <div id="kpi-total" class="kpi-value">--</div>
            </div>
            <div class="card">
                <div class="kpi-title">Procesados por IA</div>
                <div id="kpi-ia" class="kpi-value">--</div>
            </div>
            <div class="card">
                <div class="kpi-title">Eficiencia IA</div>
                <div id="kpi-percent" class="kpi-value" style="color: var(--success)">--</div>
            </div>
        </div>

        <div class="charts-main-grid">
            <!-- SALUD -->
            <div class="card">
                <div class="kpi-title" style="margin-bottom: 20px;">System Health</div>
                <div id="health-container" class="health-list">
                    <!-- Dinámico -->
                </div>
            </div>

            <!-- GRÁFICO -->
            <div class="card">
                <div class="kpi-title" style="margin-bottom: 20px;">Evolución del Catálogo</div>
                <canvas id="historyChart"></canvas>
            </div>

            <!-- ACTIVIDAD -->
            <div class="card">
                <div class="kpi-title" style="margin-bottom: 20px;">Distribución</div>
                <canvas id="distributionChart"></canvas>
            </div>
        </div>

        <div class="card">
            <div class="kpi-title" style="margin-bottom: 20px;">Historial de Ejecuciones Recientes</div>
            <table class="log-table">
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Módulo</th>
                        <th>Resultado</th>
                    </tr>
                </thead>
                <tbody id="logs-body">
                    <!-- Dinámico -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
