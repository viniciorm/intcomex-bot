server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;

    # Ocultar versión de Nginx
    server_tokens off;

    # Autenticación Básica HTTP para todo el sitio
    auth_basic "Restricted Access - E-COM Bot Dashboard";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location / {
        index index.html;
        try_files $uri $uri/ =404;
    }

    # Bloquear el acceso a archivos de datos internos sensibles
    location ~* (estado_productos\.json|mapa_imagenes\.json)$ {
        deny all;
    }

    # Cache-Control estricto para archivos JSON sensibles del dashboard
    location ~* \.json$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Frame-Options "DENY" always;
    }

    # Cabeceras de seguridad globales
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header X-Frame-Options "DENY" always;

    # Content Security Policy (Estricta sin 'unsafe-inline' para scripts)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; font-src 'self' https://cdnjs.cloudflare.com https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;
}
